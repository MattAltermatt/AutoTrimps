name: Deploy userscript to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # .nvmrc pins the EXACT patch (26.0.0) — the runtime the oracle traces were recorded on
          # (tests/fixtures/traces/manifest.json .runtime.node). A floating major resolves to whatever
          # is newest, and fingerprint.mjs would then report a runtime MISMATCH on every divergence,
          # muddying the one signal that tells a real regression from an environmental one.
          node-version-file: .nvmrc
          cache: npm

      # `npm ci` runs postinstall -> scripts/fetch-game-clone.mjs, which materializes the SHA-pinned
      # Trimps clone. That is why there is no clone step here: the proof net's input is a managed
      # dependency, not something this workflow has to remember to fetch (#67).
      - run: npm ci

      - run: npm run lint
      - run: npm run typecheck
      # test:ci = vitest + the zero-skip census. A skipped test is not a passed test (#67).
      - run: npm run test:ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
